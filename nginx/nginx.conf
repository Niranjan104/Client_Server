worker_processes auto;

# Required when running as non-root
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {

    # Temp paths writable by non-root user
    client_body_temp_path /tmp/client_body;
    proxy_temp_path        /tmp/proxy;
    fastcgi_temp_path      /tmp/fastcgi;
    uwsgi_temp_path        /tmp/uwsgi;
    scgi_temp_path         /tmp/scgi;

    upstream blue_backend {
        server server_blue:8080;
    }

    upstream green_backend {
        server server_green:8080;
    }

    upstream blue_client {
        server client_blue:3000;
    }

    upstream green_client {
        server client_green:3000;
    }

    server {
        listen 80;

        # Health check — no proxying, no user-data
        location /health {
            return 200 '{"status":"ok","active":"${ACTIVE_COLOR}"}';
            add_header Content-Type application/json;
        }

        # Route API calls to the active backend server
        location /api/ {
            proxy_pass http://${ACTIVE_COLOR}_backend;
            proxy_http_version 1.1;
            # Use upstream hostname — not the client-supplied $host header
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Do NOT forward Upgrade header on API routes (prevents h2c smuggling)
            proxy_set_header Upgrade "";
            proxy_set_header Connection "";
        }

        # Route frontend to the active client
        location / {
            proxy_pass http://${ACTIVE_COLOR}_client;
            proxy_http_version 1.1;
            # Use upstream hostname — not the client-supplied $host header
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Only forward WebSocket upgrades — reject all other Upgrade values
            # This prevents H2C smuggling (Semgrep: possible-nginx-h2c-smuggling)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # Map: only allow 'websocket' as a valid Upgrade value
    map $http_upgrade $connection_upgrade {
        "websocket" "upgrade";
        default     "";
    }
}
