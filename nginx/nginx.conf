worker_processes auto;

events {
    worker_connections 1024;
}

http {

    upstream blue_backend {
        server server_blue:8080;
    }

    upstream green_backend {
        server server_green:8080;
    }

    upstream blue_client {
        server client_blue:3000;
    }

    upstream green_client {
        server client_green:3000;
    }

    server {
        listen 80;

        # Health check endpoint for smoke tests
        location /health {
            return 200 '{"status":"ok","active":"${ACTIVE_COLOR}"}';
            add_header Content-Type application/json;
        }

        # Route all API calls to the active backend server
        location /api/ {
            proxy_pass http://${ACTIVE_COLOR}_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route all other requests to the active frontend client
        location / {
            proxy_pass http://${ACTIVE_COLOR}_client;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
