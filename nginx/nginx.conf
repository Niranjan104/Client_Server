worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    client_body_temp_path /tmp/client_body;
    proxy_temp_path        /tmp/proxy;
    fastcgi_temp_path      /tmp/fastcgi;
    uwsgi_temp_path        /tmp/uwsgi;
    scgi_temp_path         /tmp/scgi;

    # Upstream hostnames are injected at container start via envsubst
    # Blue slot
    upstream blue_backend {
        server ${BLUE_SERVER_HOST}:8080;
    }
    upstream blue_client {
        server ${BLUE_CLIENT_HOST}:3000;
    }

    # Green slot
    upstream green_backend {
        server ${GREEN_SERVER_HOST}:8080;
    }
    upstream green_client {
        server ${GREEN_CLIENT_HOST}:3000;
    }

    server {
        listen 80;

        # Health check — returns active color
        location /health {
            return 200 '{"status":"ok","active":"${ACTIVE_COLOR}"}';
            add_header Content-Type application/json;
        }

        # API routes → active backend server
        location /api/ {
            proxy_pass http://${ACTIVE_COLOR}_backend;
            proxy_http_version 1.0;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # All other routes → active frontend client
        location / {
            proxy_pass http://${ACTIVE_COLOR}_client;
            proxy_http_version 1.0;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
