worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    client_body_temp_path /tmp/client_body;
    proxy_temp_path        /tmp/proxy;
    fastcgi_temp_path      /tmp/fastcgi;
    uwsgi_temp_path        /tmp/uwsgi;
    scgi_temp_path         /tmp/scgi;

    # ── KEY FIX: Map block instead of upstream block ──
    # By mapping the color to a variable, we force NGINX to resolve the DNS 
    # at *runtime* instead of *startup*. This prevents NGINX from instantly crashing 
    # if the inactive slot hasn't been created yet.
    map $active_color $active_backend_host {
        "blue"  "${BLUE_SERVER_HOST}";
        "green" "${GREEN_SERVER_HOST}";
    }

    map $active_color $active_client_host {
        "blue"  "${BLUE_CLIENT_HOST}";
        "green" "${GREEN_CLIENT_HOST}";
    }

    server {
        listen 80;

        # Requires a DNS resolver because we are using variables in proxy_pass
        # 168.63.129.16 = Azure internal DNS
        # 127.0.0.11    = Docker Compose internal DNS
        resolver ${RESOLVER_IP} valid=10s ipv6=off;

        # Inject environment variable into NGINX runtime
        set $active_color "${ACTIVE_COLOR}";

        # Health check — returns active color
        location /health {
            return 200 '{"status":"ok","active":"${ACTIVE_COLOR}","resolver":"${RESOLVER_IP}"}';
            add_header Content-Type application/json;
        }

        # API routes → dynamically evaluated active backend server
        location /api/ {
            proxy_pass http://$active_backend_host:8080;
            proxy_http_version 1.0;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # All other routes → dynamically evaluated active frontend client
        location / {
            proxy_pass http://$active_client_host:3000;
            proxy_http_version 1.0;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
