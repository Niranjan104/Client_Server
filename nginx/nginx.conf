worker_processes auto;

# Required when running as non-root
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {

    # Temp paths writable by non-root user
    client_body_temp_path /tmp/client_body;
    proxy_temp_path        /tmp/proxy;
    fastcgi_temp_path      /tmp/fastcgi;
    uwsgi_temp_path        /tmp/uwsgi;
    scgi_temp_path         /tmp/scgi;

    upstream blue_backend {
        server server_blue:8080;
    }

    upstream green_backend {
        server server_green:8080;
    }

    upstream blue_client {
        server client_blue:3000;
    }

    upstream green_client {
        server client_green:3000;
    }

    # Only allow websocket as a valid Upgrade value
    map $http_upgrade $connection_upgrade {
        "websocket" "upgrade";
        default     "";
    }

    server {
        listen 80;

        # Health check — no proxying
        location /health {
            return 200 '{"status":"ok","active":"${ACTIVE_COLOR}"}';
            add_header Content-Type application/json;
        }

        # Route API calls to the active backend — HTTP/1.0, no Upgrade header
        location /api/ {
            proxy_pass http://${ACTIVE_COLOR}_backend;
            proxy_http_version 1.0;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route frontend to the active client — WebSocket needed for Next.js HMR
        # nosemgrep: generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
        location / {
            proxy_pass http://${ACTIVE_COLOR}_client;
            proxy_http_version 1.1;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
