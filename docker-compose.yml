services:

  # ── Backend Servers ───────────────────────────────────────────────────────
  server_blue:
    build:
      context: ./server
    container_name: server_blue
    environment:
      - PORT=8080
      - APP_VERSION=blue
    expose:
      - "8080"
    networks:
      - app_net

  server_green:
    build:
      context: ./server
    container_name: server_green
    environment:
      - PORT=8080
      - APP_VERSION=green
    expose:
      - "8080"
    networks:
      - app_net

  # ── Frontend Clients ──────────────────────────────────────────────────────
  client_blue:
    build:
      context: ./client
      args:
        # Points to NGINX (which internally routes /api to server_blue)
        NEXT_PUBLIC_API_URL: http://localhost/api
    container_name: client_blue
    environment:
      - PORT=3000
    expose:
      - "3000"
    depends_on:
      - server_blue
    networks:
      - app_net

  client_green:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_API_URL: http://localhost/api
    container_name: client_green
    environment:
      - PORT=3000
    expose:
      - "3000"
    depends_on:
      - server_green
    networks:
      - app_net

  # ── NGINX Traffic Router ───────────────────────────────────────────────────
  # Change ACTIVE_COLOR=green and restart this service to switch slots
  nginx:
    build:
      context: ./nginx
    container_name: nginx_router
    ports:
      - "80:80"
    environment:
      - ACTIVE_COLOR=${ACTIVE_COLOR:-blue}
      - BLUE_SERVER_HOST=server_blue
      - GREEN_SERVER_HOST=server_green
      - BLUE_CLIENT_HOST=client_blue
      - GREEN_CLIENT_HOST=client_green
      - RESOLVER_IP=127.0.0.11
    depends_on:
      - client_blue
      - client_green
      - server_blue
      - server_green
    networks:
      - app_net

  # ── Monitoring: NGINX Exporter ─────────────────────────────────────────────
  nginx_exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx_exporter
    command:
      - -nginx.scrape-uri=http://nginx_router:80/metrics
    ports:
      - "9113:9113"
    depends_on:
      - nginx
    networks:
      - app_net
    profiles:
      - monitoring

  # ── Monitoring: Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - app_net
    profiles:
      - monitoring

  # ── Monitoring: cAdvisor (Docker Container Metrics) ───────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: cadvisor
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    privileged: true
    networks:
      - app_net
    profiles:
      - monitoring

  # ── Monitoring: Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - app_net
    profiles:
      - monitoring

networks:
  app_net:
    driver: bridge

volumes:
  grafana_data:
