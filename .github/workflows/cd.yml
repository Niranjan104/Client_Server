name: Azure ACR/ACI CD

on:
  workflow_run:
    workflows: ["Full Stack CI"]
    types:
      - completed
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry (ACR)
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Server Image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/server:${{ github.sha }} -t ${{ secrets.ACR_LOGIN_SERVER }}/server:latest ./server
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/server:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/server:latest

      - name: Build and Push Client Image
        run: |
          # Use Next's build argument to point to your backend API route
          docker build --build-arg NEXT_PUBLIC_API_URL=/api -t ${{ secrets.ACR_LOGIN_SERVER }}/client:${{ github.sha }} -t ${{ secrets.ACR_LOGIN_SERVER }}/client:latest ./client
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/client:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/client:latest

      - name: Build and Push NGINX Image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/nginx:${{ github.sha }} -t ${{ secrets.ACR_LOGIN_SERVER }}/nginx:latest ./nginx
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/nginx:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/nginx:latest

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update and Restart Azure Container Instances (ACI)
        run: |
          # Azure CLI does not support 'az container update'. 
          # To force an image pull, we must delete the current container and recreate it.
          
          # 1. Recreate Client Container
          az container delete --name ${{ secrets.ACI_CLIENT_NAME }} --resource-group ${{ secrets.ACI_RESOURCE_GROUP }} --yes
          
          az container create \
            --name ${{ secrets.ACI_CLIENT_NAME }} \
            --resource-group ${{ secrets.ACI_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/client:${{ github.sha }} \
            --registry-login-server ${{ secrets.ACR_LOGIN_SERVER }} \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --dns-name-label client-${{ env.RANDOM_SUFFIX || 'prod' }} \
            --ports 3000 \
            --environment-variables NEXT_PUBLIC_API_URL=http://${{ secrets.ACI_SERVER_NAME }}.${{ secrets.ACI_REGION }}.azurecontainer.io:8080 \
            --cpu 1 --memory 1.5
          
          # 2. Recreate Server Container
          az container delete --name ${{ secrets.ACI_SERVER_NAME }} --resource-group ${{ secrets.ACI_RESOURCE_GROUP }} --yes
          
          az container create \
            --name ${{ secrets.ACI_SERVER_NAME }} \
            --resource-group ${{ secrets.ACI_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/server:${{ github.sha }} \
            --registry-login-server ${{ secrets.ACR_LOGIN_SERVER }} \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --dns-name-label server-${{ env.RANDOM_SUFFIX || 'prod' }} \
            --ports 8080 \
            --cpu 1 --memory 1.5

