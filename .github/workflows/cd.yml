name: Azure ACR/ACI CD

on:
  workflow_run:
    workflows: ["Full Stack CI"]
    types:
      - completed
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry (ACR)
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Server Image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/server:${{ github.sha }} -t ${{ secrets.ACR_LOGIN_SERVER }}/server:latest ./server
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/server:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/server:latest

      - name: Build and Push Client Image
        run: |
          # Use Next's build argument to point to your backend API route
          docker build --build-arg NEXT_PUBLIC_API_URL=/api -t ${{ secrets.ACR_LOGIN_SERVER }}/client:${{ github.sha }} -t ${{ secrets.ACR_LOGIN_SERVER }}/client:latest ./client
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/client:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/client:latest

      - name: Build and Push NGINX Image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/nginx:${{ github.sha }} -t ${{ secrets.ACR_LOGIN_SERVER }}/nginx:latest ./nginx
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/nginx:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/nginx:latest

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update and Restart Azure Container Instances (ACI)
        run: |
          # Azure CLI does not support 'az container update'. 
          # To force an image pull, we must delete the current container and recreate it.
          
          # Clean hidden newlines from user secrets
          RG=$(echo "${{ secrets.ACI_RESOURCE_GROUP }}" | tr -d '\r\n')
          CLIENT_NAME=$(echo "${{ secrets.ACI_CLIENT_NAME }}" | tr -d '\r\n')
          SERVER_NAME=$(echo "${{ secrets.ACI_SERVER_NAME }}" | tr -d '\r\n')
          LOGIN_SERVER=$(echo "${{ secrets.ACR_LOGIN_SERVER }}" | tr -d '\r\n')
          USERNAME=$(echo "${{ secrets.ACR_USERNAME }}" | tr -d '\r\n')
          PASSWORD=$(echo "${{ secrets.ACR_PASSWORD }}" | tr -d '\r\n')
          
          # Compute deployment color for blue/green showcase
          if [ $(( ${{ github.run_number }} % 2 )) -eq 0 ]; then
            DEPLOY_COLOR="blue"
          else
            DEPLOY_COLOR="green"
          fi
          
          # 1. Recreate Client Container
          az container delete --name "$CLIENT_NAME" --resource-group "$RG" --yes || true
          
          az container create \
            --name "$CLIENT_NAME" \
            --resource-group "$RG" \
            --location centralindia \
            --os-type Linux \
            --image "$LOGIN_SERVER/client:${{ github.sha }}" \
            --registry-login-server "$LOGIN_SERVER" \
            --registry-username "$USERNAME" \
            --registry-password "$PASSWORD" \
            --dns-name-label client-${{ github.run_number }} \
            --ports 3000 \
            --environment-variables NEXT_PUBLIC_API_URL="http://$SERVER_NAME.centralindia.azurecontainer.io:8080" \
            --cpu 1 --memory 1.5
          
          # 2. Recreate Server Container
          az container delete --name "$SERVER_NAME" --resource-group "$RG" --yes || true
          
          az container create \
            --name "$SERVER_NAME" \
            --resource-group "$RG" \
            --location centralindia \
            --os-type Linux \
            --image "$LOGIN_SERVER/server:${{ github.sha }}" \
            --registry-login-server "$LOGIN_SERVER" \
            --registry-username "$USERNAME" \
            --registry-password "$PASSWORD" \
            --dns-name-label server-${{ github.run_number }} \
            --ports 8080 \
            --environment-variables APP_VERSION="$DEPLOY_COLOR" \
            --cpu 1 --memory 1.5

