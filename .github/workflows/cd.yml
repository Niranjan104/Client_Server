name: Azure ACR/ACI CD

on:
  workflow_run:
    workflows: ["Infrastructure Provisioning (Terraform)"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve ACR Credentials
        id: acr
        run: |
          ACR_NAME=$(echo "${{ secrets.ACR_NAME }}" | tr -d '\r\n')

          if [ -z "$ACR_NAME" ]; then
            echo "::error::ACR_NAME secret is missing."
            exit 1
          fi

          if ! echo "$ACR_NAME" | grep -Eq '^[a-z0-9]{5,50}$'; then
            echo "::error::ACR_NAME '$ACR_NAME' is invalid. Use 5-50 lowercase alphanumeric characters."
            exit 1
          fi

          CLEAN_LOGIN_SERVER=$(az acr show --name "$ACR_NAME" --query "loginServer" -o tsv | tr -d '\r\n')
          if [ -z "$CLEAN_LOGIN_SERVER" ]; then
            echo "::error::Could not resolve ACR login server from Azure for registry '$ACR_NAME'."
            exit 1
          fi

          az acr update --name "$ACR_NAME" --admin-enabled true --output none
          ACR_USERNAME=$(az acr credential show --name "$ACR_NAME" --query "username" -o tsv | tr -d '\r\n')
          ACR_PASSWORD=$(az acr credential show --name "$ACR_NAME" --query "passwords[0].value" -o tsv | tr -d '\r\n')

          if [ -z "$ACR_USERNAME" ] || [ -z "$ACR_PASSWORD" ]; then
            echo "::error::Could not resolve ACR credentials. Ensure admin user is enabled on ACR."
            exit 1
          fi

          echo "login_server=$CLEAN_LOGIN_SERVER" >> $GITHUB_OUTPUT
          echo "username=$ACR_USERNAME" >> $GITHUB_OUTPUT
          echo "password=$ACR_PASSWORD" >> $GITHUB_OUTPUT

      - name: Log in to ACR for Docker Push
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.acr.outputs.login_server }}
          username: ${{ steps.acr.outputs.username }}
          password: ${{ steps.acr.outputs.password }}

      - name: Build and Push Server Image
        run: |
          docker build \
            -t ${{ steps.acr.outputs.login_server }}/server:${{ github.sha }} \
            -t ${{ steps.acr.outputs.login_server }}/server:latest \
            ./server
          docker push ${{ steps.acr.outputs.login_server }}/server:${{ github.sha }}
          docker push ${{ steps.acr.outputs.login_server }}/server:latest

      - name: Build and Push Client Image
        run: |
          NGINX_LABEL=$(echo "${{ secrets.NGINX_DNS_LABEL }}" | tr -d '\r\n')

          docker build \
            --build-arg NEXT_PUBLIC_API_URL="http://${NGINX_LABEL}.centralindia.azurecontainer.io/api" \
            -t ${{ steps.acr.outputs.login_server }}/client:${{ github.sha }} \
            -t ${{ steps.acr.outputs.login_server }}/client:latest \
            ./client
          docker push ${{ steps.acr.outputs.login_server }}/client:${{ github.sha }}
          docker push ${{ steps.acr.outputs.login_server }}/client:latest

      - name: Build and Push NGINX Image
        run: |
          docker build \
            -t ${{ steps.acr.outputs.login_server }}/nginx:${{ github.sha }} \
            -t ${{ steps.acr.outputs.login_server }}/nginx:latest \
            ./nginx
          docker push ${{ steps.acr.outputs.login_server }}/nginx:${{ github.sha }}
          docker push ${{ steps.acr.outputs.login_server }}/nginx:latest

      - name: Deploy to Inactive Slot and Flip Traffic
        run: |
          RG=$(echo "${{ secrets.ACI_RESOURCE_GROUP }}" | tr -d '\r\n')
          LOGIN_SERVER=$(echo "${{ steps.acr.outputs.login_server }}" | tr -d '\r\n')
          USERNAME=$(echo "${{ steps.acr.outputs.username }}" | tr -d '\r\n')
          PASSWORD=$(echo "${{ steps.acr.outputs.password }}" | tr -d '\r\n')
          NGINX_LABEL=$(echo "${{ secrets.NGINX_DNS_LABEL }}" | tr -d '\r\n')
          SERVER_BASE=$(echo "${{ secrets.SERVER_BASE_NAME }}" | tr -d '\r\n')
          CLIENT_BASE=$(echo "${{ secrets.CLIENT_BASE_NAME }}" | tr -d '\r\n')

          ACTIVE_COLOR=$(az container show \
            --name "$NGINX_LABEL" \
            --resource-group "$RG" \
            --query "containers[0].environmentVariables[?name=='ACTIVE_COLOR'].value | [0]" \
            --output tsv 2>/dev/null || echo "blue")

          if [ -z "$ACTIVE_COLOR" ] || [ "$ACTIVE_COLOR" = "None" ]; then
            ACTIVE_COLOR="blue"
          fi

          if [ "$ACTIVE_COLOR" = "blue" ]; then
            INACTIVE_COLOR="green"
          else
            INACTIVE_COLOR="blue"
          fi

          echo "Current active slot : $ACTIVE_COLOR"
          echo "Deploying to slot   : $INACTIVE_COLOR"

          BLUE_SERVER_HOST="${SERVER_BASE}-blue.centralindia.azurecontainer.io"
          GREEN_SERVER_HOST="${SERVER_BASE}-green.centralindia.azurecontainer.io"
          BLUE_CLIENT_HOST="${CLIENT_BASE}-blue.centralindia.azurecontainer.io"
          GREEN_CLIENT_HOST="${CLIENT_BASE}-green.centralindia.azurecontainer.io"

          echo "Deploying new server image to ${SERVER_BASE}-${INACTIVE_COLOR} ..."
          az container delete \
            --name "${SERVER_BASE}-${INACTIVE_COLOR}" \
            --resource-group "$RG" \
            --yes 2>/dev/null || true

          az container create \
            --name "${SERVER_BASE}-${INACTIVE_COLOR}" \
            --resource-group "$RG" \
            --location centralindia \
            --os-type Linux \
            --image "$LOGIN_SERVER/server:${{ github.sha }}" \
            --registry-login-server "$LOGIN_SERVER" \
            --registry-username "$USERNAME" \
            --registry-password "$PASSWORD" \
            --dns-name-label "${SERVER_BASE}-${INACTIVE_COLOR}" \
            --ports 8080 \
            --environment-variables APP_VERSION="$INACTIVE_COLOR" PORT="8080" \
            --cpu 0.5 --memory 1

          echo "Deploying new client image to ${CLIENT_BASE}-${INACTIVE_COLOR} ..."
          az container delete \
            --name "${CLIENT_BASE}-${INACTIVE_COLOR}" \
            --resource-group "$RG" \
            --yes 2>/dev/null || true

          az container create \
            --name "${CLIENT_BASE}-${INACTIVE_COLOR}" \
            --resource-group "$RG" \
            --location centralindia \
            --os-type Linux \
            --image "$LOGIN_SERVER/client:${{ github.sha }}" \
            --registry-login-server "$LOGIN_SERVER" \
            --registry-username "$USERNAME" \
            --registry-password "$PASSWORD" \
            --dns-name-label "${CLIENT_BASE}-${INACTIVE_COLOR}" \
            --ports 3000 \
            --cpu 0.5 --memory 1

          echo "Waiting 45s for ${INACTIVE_COLOR} slot to start..."
          sleep 45

          INACTIVE_SERVER_URL="http://${SERVER_BASE}-${INACTIVE_COLOR}.centralindia.azurecontainer.io:8080/api/version"
          INACTIVE_CLIENT_URL="http://${CLIENT_BASE}-${INACTIVE_COLOR}.centralindia.azurecontainer.io:3000"

          echo "Smoke testing backend: $INACTIVE_SERVER_URL"
          echo "Smoke testing frontend: $INACTIVE_CLIENT_URL"

          SMOKE_PASSED=false
          for i in 1 2 3 4 5; do
            SERVER_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$INACTIVE_SERVER_URL" --max-time 10 || echo "000")
            CLIENT_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$INACTIVE_CLIENT_URL" --max-time 10 || echo "000")

            echo "  Attempt $i: Backend HTTP $SERVER_STATUS | Frontend HTTP $CLIENT_STATUS"

            if [ "$SERVER_STATUS" = "200" ] && [ "$CLIENT_STATUS" = "200" ]; then
              SMOKE_PASSED=true
              break
            fi
            sleep 15
          done

          if [ "$SMOKE_PASSED" != "true" ]; then
            echo "::error::Smoke test FAILED on ${INACTIVE_COLOR} slot."
            echo "Rollback initiated: Tearing down broken ${INACTIVE_COLOR} containers..."

            az container delete --name "${SERVER_BASE}-${INACTIVE_COLOR}" --resource-group "$RG" --yes 2>/dev/null || true
            az container delete --name "${CLIENT_BASE}-${INACTIVE_COLOR}" --resource-group "$RG" --yes 2>/dev/null || true

            echo "Rollback complete. Active slot (${ACTIVE_COLOR}) unchanged and remains live."
            exit 1
          fi

          echo "Smoke tests PASSED. Flipping NGINX from ${ACTIVE_COLOR} -> ${INACTIVE_COLOR} ..."

          az container create \
            --name "$NGINX_LABEL" \
            --resource-group "$RG" \
            --location centralindia \
            --os-type Linux \
            --image "$LOGIN_SERVER/nginx:${{ github.sha }}" \
            --registry-login-server "$LOGIN_SERVER" \
            --registry-username "$USERNAME" \
            --registry-password "$PASSWORD" \
            --dns-name-label "$NGINX_LABEL" \
            --ports 80 \
            --environment-variables \
                ACTIVE_COLOR="$INACTIVE_COLOR" \
                BLUE_SERVER_HOST="$BLUE_SERVER_HOST" \
                GREEN_SERVER_HOST="$GREEN_SERVER_HOST" \
                BLUE_CLIENT_HOST="$BLUE_CLIENT_HOST" \
                GREEN_CLIENT_HOST="$GREEN_CLIENT_HOST" \
                RESOLVER_IP="168.63.129.16" \
            --cpu 0.25 --memory 0.5

          if [ "$ACTIVE_COLOR" != "blue" ] && [ "$ACTIVE_COLOR" != "green" ]; then
            echo "Initial deployment detected. No old containers to teardown."
          else
            echo "Traffic successfully routed to ${INACTIVE_COLOR}."
            echo "Tearing down old ${ACTIVE_COLOR} slot to save Azure costs..."
            az container delete --name "${SERVER_BASE}-${ACTIVE_COLOR}" --resource-group "$RG" --yes 2>/dev/null || echo "Server delete skipped/failed"
            az container delete --name "${CLIENT_BASE}-${ACTIVE_COLOR}" --resource-group "$RG" --yes 2>/dev/null || echo "Client delete skipped/failed"
          fi

          echo ""
          echo "Deployment complete."
          echo "  Active slot : $INACTIVE_COLOR"
          echo "  Public URL  : http://$NGINX_LABEL.centralindia.azurecontainer.io"
