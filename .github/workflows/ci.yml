name: Full Stack CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: read
  security-events: write   # Required for CodeQL and Trivy to upload SARIF results

jobs:
  # ── Phase 1: Build + Lint ────────────────────────────────────────────────
  validate:
    name: Build & Lint (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [client, server]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install Dependencies
        working-directory: ${{ matrix.app }}
        run: npm ci

      - name: Lint
        working-directory: ${{ matrix.app }}
        run: npm run lint

      - name: Test
        working-directory: ${{ matrix.app }}
        run: npm test -- --ci

      - name: Build (client only)
        if: matrix.app == 'client'
        working-directory: client
        run: npm run build

  # ── Phase 2: SCA — Dependency Vulnerability Scan ────────────────────────
  sca-npm-audit:
    name: SCA — npm audit
    runs-on: ubuntu-latest
    needs: validate

    strategy:
      matrix:
        app: [client, server]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install Dependencies
        working-directory: ${{ matrix.app }}
        run: npm ci

      - name: npm audit (SCA)
        working-directory: ${{ matrix.app }}
        # Only fail on Critical severity (High are often transitive dev-dependency vulns)
        run: npm audit --audit-level=critical

  # ── Phase 3: SAST — Semgrep Static Analysis ───────────────────────────────
  sast-semgrep:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    needs: validate
    container:
      image: semgrep/semgrep

    steps:
      - uses: actions/checkout@v4

      - name: Semgrep OWASP + Security Scan
        run: |
          semgrep ci \
            --config=p/owasp-top-ten \
            --config=p/javascript \
            --config=p/typescript \
            --config=p/nodejs \
            --exclude-rule generic.nginx.security.dynamic-proxy-host.dynamic-proxy-host \
            --exclude-rule generic.nginx.security.request-host-used.request-host-used
        env:
          SEMGREP_SEND_METRICS: "off"

  # ── Phase 4: SAST — CodeQL Deep Analysis ────────────────────────────────
  sast-codeql:
    name: SAST — CodeQL
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

  # ── Phase 5: SCA — Trivy Container Image Scan ────────────────────────────
  sca-trivy:
    name: SCA — Trivy Image Scan (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: validate

    strategy:
      matrix:
        include:
          - image: client
            context: ./client
          - image: server
            context: ./server
          - image: nginx
            context: ./nginx

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image for Scan
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=http://localhost/api \
            -t scan-target-${{ matrix.image }}:latest \
            ${{ matrix.context }}

      - name: Trivy Container Scan
        uses: aquasecurity/trivy-action@master
        # continue-on-error: true ensures SARIF is written before the step exits
        # so the upload step always has a file to upload regardless of findings
        continue-on-error: true
        with:
          image-ref: scan-target-${{ matrix.image }}:latest
          format: "sarif"
          output: "trivy-${{ matrix.image }}.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Upload Trivy SARIF to GitHub Security Tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-${{ matrix.image }}.sarif"
